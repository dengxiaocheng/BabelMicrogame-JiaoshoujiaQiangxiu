<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脚手架抢修</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a1a2e;color:#eee;font-family:monospace;display:flex;flex-direction:column;height:100vh}
    #top-bar{display:flex;justify-content:space-between;padding:10px 20px;background:#16213e;align-items:center}
    .stat{font-size:14px}.stat span{color:#ffc107;font-weight:bold}
    #phase-msg{color:#4caf50;font-size:14px}
    #main{display:flex;flex:1;overflow:hidden}
    #canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px}
    #risk-map{background:#0f3460;border:2px solid #333;cursor:crosshair;border-radius:4px}
    #side-panel{width:240px;background:#16213e;padding:10px;display:flex;flex-direction:column}
    #side-panel h3{font-size:14px;margin-bottom:8px;color:#aaa}
    #repair-queue{flex:1;overflow-y:auto;margin-bottom:10px;font-size:13px;color:#888}
    .queue-card{display:flex;align-items:center;gap:6px;padding:6px 8px;margin-bottom:4px;background:#1a1a2e;border:1px solid #333;border-radius:3px;cursor:grab;color:#ccc}
    .queue-card.drag-over{border-color:#2196f3}.queue-card.dragging{opacity:.5}
    .queue-num{color:#2196f3;font-weight:bold;min-width:18px}.queue-label{flex:1}
    .queue-risk{font-weight:bold}.queue-remove{cursor:pointer;color:#f44336;padding:0 4px}
    .queue-remove:hover{color:#ff6b6b}
    #btn-dispatch{padding:10px;background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:monospace;font-size:14px}
    #btn-dispatch:hover{background:#c73850}
    #hint{text-align:center;padding:6px;font-size:12px;color:#888;background:#0f3460}
  </style>
</head>
<body>
  <div id="top-bar">
    <div class="stat">时间: <span id="stat-time">300</span>s</div>
    <div id="phase-msg">脚手架抢修中</div>
    <div class="stat">材料: <span id="stat-materials">30</span></div>
    <div class="stat">承压: <span id="stat-pressure">0</span>%</div>
  </div>
  <div id="main">
    <div id="canvas-wrap">
      <canvas id="risk-map" width="640" height="420"></canvas>
    </div>
    <div id="side-panel">
      <h3>修复队列 (拖拽排序)</h3>
      <div id="repair-queue">点击风险图节点添加修复点</div>
      <button id="btn-dispatch">派工抢修</button>
    </div>
  </div>
  <div id="hint">点击节点选择 → 再次点击加入队列 → 拖拽排序 → 派工抢修</div>
  <script type="module" src="src/game.js"></script>
</body>
</html>
