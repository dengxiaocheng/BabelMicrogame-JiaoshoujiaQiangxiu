<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脚手架抢修</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a1a2e;color:#eee;font-family:monospace;display:flex;flex-direction:column;height:100vh}

    /* Top stats bar */
    #top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#16213e}
    .stat{font-size:13px}.stat span{font-weight:bold}
    .stat-time span{color:#ffc107}
    .stat-mat span{color:#2196f3}
    #phase-msg{font-size:13px;flex:1;text-align:center}

    /* Prominent pressure gauge — first thing player sees */
    #pressure-wrap{padding:0 12px;background:#0d1b2a}
    #pressure-track{width:100%;height:24px;background:#1b2838;border-radius:3px;position:relative;overflow:hidden;border:1px solid #333}
    #pressure-fill{height:100%;transition:width .5s ease,background .5s ease;border-radius:3px}
    #pressure-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;text-shadow:0 0 4px #000;letter-spacing:1px}

    /* Core loop step indicator */
    #step-bar{display:flex;background:#0f3460;padding:3px 8px;gap:2px}
    .step{flex:1;text-align:center;padding:4px 2px;font-size:10px;color:#555;border-radius:2px;transition:color .3s,background .3s}
    .step.active{color:#fff;background:#1a1a2e;font-weight:bold}
    .step.done{color:#4caf50}

    /* Main layout */
    #main{display:flex;flex:1;overflow:hidden}
    #canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px}
    #risk-map{background:#0f3460;border:2px solid #333;cursor:crosshair;border-radius:4px}

    /* Side panel */
    #side-panel{width:250px;background:#16213e;padding:8px;display:flex;flex-direction:column;gap:6px;font-size:12px}
    #side-panel h3{font-size:12px;color:#666;margin:0;border-bottom:1px solid #1a1a2e;padding-bottom:3px}

    /* Node info panel */
    #node-info{background:#1a1a2e;border:1px solid #333;border-radius:3px;padding:8px;min-height:56px;line-height:1.6}
    #node-info .lbl{color:#666;margin-right:4px}
    #node-info .val{font-weight:bold}
    .warn{color:#f44336}.ok{color:#4caf50}

    /* Repair queue */
    #repair-queue{flex:1;overflow-y:auto;color:#666}
    .queue-card{display:flex;align-items:center;gap:5px;padding:5px 7px;margin-bottom:3px;background:#1a1a2e;border:1px solid #333;border-radius:3px;cursor:grab;color:#ccc;font-size:12px}
    .queue-card.drag-over{border-color:#2196f3}.queue-card.dragging{opacity:.4}
    .queue-num{color:#2196f3;font-weight:bold;min-width:16px}
    .queue-label{flex:1}
    .queue-risk{font-weight:bold}
    .queue-cost{color:#2196f3;font-size:11px}
    .queue-remove{cursor:pointer;color:#f44336;padding:0 3px;font-size:14px}
    .queue-remove:hover{color:#ff6b6b}

    /* Dispatch button */
    #btn-dispatch{padding:10px;background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:monospace;font-size:14px;font-weight:bold;letter-spacing:2px}
    #btn-dispatch:hover:not(:disabled){background:#c73850}
    #btn-dispatch:disabled{background:#444;cursor:not-allowed;color:#888}

    /* Event log */
    #event-log-wrap{flex-shrink:0}
    #event-log{max-height:72px;overflow-y:auto;background:#0f3460;border-radius:3px;padding:4px 6px}
    .event-msg{padding:2px 0;border-bottom:1px solid #16213e;font-size:11px;line-height:1.4}

    /* Bottom hint */
    #hint{text-align:center;padding:5px;font-size:11px;color:#555;background:#0d1b2a}

    /* End overlay */
    #end-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:10;align-items:center;justify-content:center;flex-direction:column;gap:16px}
    #end-overlay.show{display:flex}
    #end-title{font-size:28px;font-weight:bold;letter-spacing:3px}
    #end-stats{font-size:14px;color:#aaa;line-height:1.8}
  </style>
</head>
<body>
  <div id="top-bar">
    <div class="stat stat-time">时间 <span id="stat-time">300</span>s</div>
    <div id="phase-msg" style="color:#4caf50">脚手架抢修进行中</div>
    <div class="stat stat-mat">材料 <span id="stat-materials">30</span></div>
  </div>

  <div id="pressure-wrap">
    <div id="pressure-track">
      <div id="pressure-fill" style="width:0%;background:#4caf50"></div>
      <div id="pressure-text">塌陷压力 0%</div>
    </div>
  </div>

  <div id="step-bar">
    <div class="step active" id="step-view">查看风险图</div>
    <div class="step" id="step-select">选择修复点</div>
    <div class="step" id="step-queue">排列队列</div>
    <div class="step" id="step-dispatch">派工用料</div>
    <div class="step" id="step-propagate">风险传播</div>
  </div>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="risk-map" width="640" height="420"></canvas>
    </div>
    <div id="side-panel">
      <h3>节点信息</h3>
      <div id="node-info"><span style="color:#555">点击或悬停节点查看详情</span></div>
      <h3>修复队列 (拖拽排序)</h3>
      <div id="repair-queue">点击节点选择 → 再次点击加入队列</div>
      <button id="btn-dispatch" disabled>派 工 抢 修</button>
      <div id="event-log-wrap">
        <h3>事件</h3>
        <div id="event-log"><div style="color:#444;font-size:11px">暂无事件</div></div>
      </div>
    </div>
  </div>

  <div id="hint">点击节点查看详情 → 再次点击加入队列 → 拖拽排序 → 派工消耗材料 → 观察风险传播</div>

  <div id="end-overlay">
    <div id="end-title"></div>
    <div id="end-stats"></div>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
